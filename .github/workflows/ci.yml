# =============================================================================
# PacBio HiFi Variant Pipeline — CI
# =============================================================================
# Runs a lightweight stub validation on every push and pull request.
#
# What this tests:
#   - Nextflow installs and runs correctly
#   - All module definitions are syntactically correct
#   - Channel wiring resolves without errors (stub-run mode)
#   - Single-sample and multi-sample modes both complete end-to-end
#
# Stub-run mode replaces all process scripts with stubs that create
# empty output files of the correct type. No real data, reference
# files, or bioinformatics tools are required or executed.
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - dev
      - dev/*
  pull_request:
    branches:
      - main
      - dev
      - dev/*

jobs:

  stub_validation:
    name: Nextflow Stub Validation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      # Single-sample stub run — validates default minimap2 + bcftools path
      - name: Stub run — single sample (minimap2 + bcftools)
        run: |
          nextflow run main.nf \
            --reads     test_data/sample1/synthetic_reads.fastq \
            --reference test_data/sample1/reference_region.fa \
            --sample    sample_10snv \
            --outdir    ci_stub_single \
            -stub-run

      # Multi-sample stub run — validates samplesheet channel wiring
      - name: Stub run — multi-sample samplesheet
        run: |
          nextflow run main.nf \
            --samplesheet test_data/samplesheet.csv \
            --reference   test_data/sample1/reference_region.fa \
            --outdir      ci_stub_multi \
            -stub-run

      - name: Upload Nextflow log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextflow-log
          path: .nextflow.log
          retention-days: 7
