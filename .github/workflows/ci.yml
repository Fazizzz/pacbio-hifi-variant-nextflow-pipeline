# =============================================================================
# PacBio HiFi Variant Pipeline — CI
# =============================================================================
# Runs the full pipeline on the synthetic chr20 test dataset on every
# push and pull request to main and dev branches.
#
# What this tests:
#   - conda environment solves correctly
#   - all pipeline scripts are executable
#   - minimap2 alignment runs and produces a valid BAM
#   - bcftools variant calling runs and produces a valid VCF
#   - QC report and HTML dashboard are generated
#   - Nextflow pipeline runs end-to-end with -profile test
#
# Test dataset:
#   reference/chr20.fa               — chr20 reference (subset)
#   test_data/synthetic_reads.fastq  — 25 synthetic HiFi reads, 20x depth
#   test_data/truth_variants.vcf     — 10 known SNVs for validation
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 — Shell script validation
  # Runs the pipeline using shell scripts directly (no Nextflow).
  # This validates the core bioinformatics logic independently of
  # the Nextflow layer, making failures easier to diagnose.
  # ---------------------------------------------------------------------------
  shell_pipeline:
    name: Shell Pipeline Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up conda environment using the environment.yml file
      # mamba is used for faster dependency solving
      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: pacbio_nf
          auto-activate-base: false
          miniforge-version: latest

      # Download the pbsim3 CCS model file required for read simulation
      # Not included in the conda package — must be downloaded separately
      - name: Download pbsim3 CCS model
        shell: bash -el {0}
        run: |
          curl -L \
            https://raw.githubusercontent.com/yukiteruono/pbsim3/master/data/QSHMM-PACBIO-CCS.model \
            -o $CONDA_PREFIX/data/QSHMM-PACBIO-CCS.model

      # Make all pipeline scripts executable
      - name: Make scripts executable
        run: |
          chmod +x scripts/pipeline/*.sh
          chmod +x scripts/run_pipeline.sh
          chmod +x scripts/report/generate_html_report.py

      # Run the full shell pipeline against the synthetic test dataset
      - name: Run shell pipeline
        shell: bash -el {0}
        run: |
          bash scripts/run_pipeline.sh \
            -r reference/chr20.fa \
            -i test_data/synthetic_reads.fastq \
            -s synthetic_reads \
            -o ci_results \
            -t 2

      # Validate that expected output files were produced
      - name: Validate outputs
        shell: bash -el {0}
        run: |
          echo "Checking BAM output..."
          [ -f ci_results/synthetic_reads.bam ] || \
            (echo "ERROR: BAM not found" && exit 1)

          echo "Checking BAM index..."
          [ -f ci_results/synthetic_reads.bam.bai ] || \
            (echo "ERROR: BAM index not found" && exit 1)

          echo "Checking VCF output..."
          [ -f ci_results/synthetic_reads_norm.vcf.gz ] || \
            (echo "ERROR: VCF not found" && exit 1)

          echo "Checking QC text report..."
          [ -f reports/synthetic_reads_qc_report.txt ] || \
            (echo "ERROR: QC text report not found" && exit 1)

          echo "Checking QC HTML report..."
          [ -f reports/synthetic_reads_qc_report.html ] || \
            (echo "ERROR: QC HTML report not found" && exit 1)

          echo "All expected outputs found."

      # Validate BAM alignment statistics
      - name: Validate BAM
        shell: bash -el {0}
        run: |
          echo "BAM flagstat:"
          samtools flagstat ci_results/synthetic_reads.bam

          MAPPED=$(samtools flagstat ci_results/synthetic_reads.bam \
            | grep "primary mapped" \
            | awk '{print $1}')

          echo "Mapped reads: $MAPPED"

          if [ "$MAPPED" -lt 20 ]; then
            echo "ERROR: Too few mapped reads ($MAPPED). Expected >= 20."
            exit 1
          fi

          echo "BAM validation passed."

      # Validate VCF variant count
      - name: Validate VCF
        shell: bash -el {0}
        run: |
          echo "VCF summary:"
          bcftools stats ci_results/synthetic_reads_norm.vcf.gz | grep "^SN"

          VARIANT_COUNT=$(bcftools view -H \
            ci_results/synthetic_reads_norm.vcf.gz | wc -l | tr -d ' ')

          echo "Variant count: $VARIANT_COUNT"

          if [ "$VARIANT_COUNT" -lt 5 ]; then
            echo "ERROR: Too few variants called ($VARIANT_COUNT). Expected >= 5."
            exit 1
          fi

          echo "VCF validation passed."

      # Upload QC report as a CI artifact so it can be downloaded
      # and inspected from the GitHub Actions run page
      - name: Upload QC report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qc-report-shell
          path: reports/
          retention-days: 7


  # ---------------------------------------------------------------------------
  # Job 2 — Nextflow pipeline validation
  # Runs the pipeline using Nextflow with -profile test.
  # Tests the full Nextflow layer on top of the shell scripts.
  # ---------------------------------------------------------------------------
  nextflow_pipeline:
    name: Nextflow Pipeline Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: pacbio_nf
          auto-activate-base: false
          miniforge-version: latest

      - name: Download pbsim3 CCS model
        shell: bash -el {0}
        run: |
          curl -L \
            https://raw.githubusercontent.com/yukiteruono/pbsim3/master/data/QSHMM-PACBIO-CCS.model \
            -o $CONDA_PREFIX/data/QSHMM-PACBIO-CCS.model

      - name: Make scripts executable
        run: |
          chmod +x scripts/pipeline/*.sh
          chmod +x scripts/run_pipeline.sh
          chmod +x scripts/report/generate_html_report.py

      # Install Nextflow
      - name: Install Nextflow
        shell: bash -el {0}
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      # Run Nextflow pipeline with test profile
      - name: Run Nextflow pipeline
        shell: bash -el {0}
        run: |
          nextflow run main.nf \
            -profile test \
            -with-report test_results/pipeline_info/report.html \
            -with-timeline test_results/pipeline_info/timeline.html \
            -with-dag test_results/pipeline_info/dag.svg

      # Validate Nextflow outputs
      - name: Validate Nextflow outputs
        shell: bash -el {0}
        run: |
          echo "Checking Nextflow BAM output..."
          [ -f test_results/bam/synthetic_reads.bam ] || \
            (echo "ERROR: Nextflow BAM not found" && exit 1)

          echo "Checking Nextflow VCF output..."
          [ -f test_results/vcf/synthetic_reads_norm.vcf.gz ] || \
            (echo "ERROR: Nextflow VCF not found" && exit 1)

          echo "Checking Nextflow QC report..."
          [ -f test_results/reports/synthetic_reads_qc_report.html ] || \
            (echo "ERROR: Nextflow QC HTML report not found" && exit 1)

          echo "All Nextflow outputs found."

      # Upload Nextflow execution reports as artifacts
      - name: Upload Nextflow reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextflow-reports
          path: test_results/
          retention-days: 7
