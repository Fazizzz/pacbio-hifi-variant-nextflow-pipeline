# =============================================================================
# PacBio HiFi Variant Pipeline — CI (dev/benchmarking)
# =============================================================================
# Runs a lightweight stub validation on every push and pull request.
#
# What this tests:
#   - Nextflow installs and runs correctly
#   - All module definitions are syntactically correct
#   - Channel wiring resolves without errors (stub-run mode)
#   - Single-sample mode completes end-to-end with stub outputs
#
# Stub-run mode replaces all process scripts with stubs that create
# empty output files of the correct type. No real data, reference
# files, Docker images, or bioinformatics tools are required.
#
# Full benchmarking validation (shell pipeline + real alignment +
# variant calling against truth VCF) is intended to be run locally
# using the provided scripts and synthetic test data in test_data/.
# See README for instructions.
# =============================================================================

name: CI

on:
  push:
    branches:
      - dev/benchmarking
      - dev
  pull_request:
    branches:
      - dev/benchmarking
      - dev

jobs:

  stub_validation:
    name: Nextflow Stub Validation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      # Single-sample stub run — validates default minimap2 + bcftools path
      # Uses committed synthetic reads and reference region from test_data/
      - name: Stub run — single sample (minimap2 + bcftools)
        run: |
          nextflow run main.nf \
            --reads     test_data/synthetic_reads.fastq \
            --reference test_data/reference_region.fa \
            --sample    synthetic_reads \
            --outdir    ci_stub_results \
            -stub-run

      - name: Upload Nextflow log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextflow-log
          path: .nextflow.log
          retention-days: 7
